<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أرشيف ذكرياتنا</title>
    <style>
        body { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; min-height: 100vh; padding-bottom: 50px; }
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #ff9a9e; z-index:100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
        .heart-container { position: relative; width: 160px; height: 140px; margin: 50px auto; animation: beat 1.5s infinite ease-in-out; }
        .heart { width: 160px; height: 140px; background: #e91e63; position: relative; transform: rotate(-45deg); box-shadow: 0 0 20px rgba(233, 30, 99, 0.4); }
        .heart::before, .heart::after { content: ""; width: 160px; height: 160px; background: #e91e63; border-radius: 50%; position: absolute; }
        .heart::before { top: -80px; left: 0; }
        .heart::after { top: 0; left: 80px; }
        #timer { position: absolute; top: 25px; left: 0; width: 100%; transform: rotate(45deg); color: white; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); z-index: 1; line-height: 1.3; }
        .card { background: rgba(255, 255, 255, 0.9); padding: 25px; margin: 15px auto; max-width: 400px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        input, textarea { width: 85%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 12px; background: #fdf2f5; }
        button { background: #e91e63; color: white; border: none; padding: 14px; width: 90%; border-radius: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login-screen">
        <h2 style="color: white;">أهلاً بكِ في عالمنا الخاص ❤️</h2>
        <input type="password" id="pass" placeholder="اكتبي الباسورد هنا..">
        <button onclick="window.checkPass()" style="width: 200px;">دخول</button>
        <div id="hearts-anim" style="margin-top:20px; font-size: 30px;"></div>
    </div>

    <div id="main-content" class="hidden">
        <div class="heart-container">
            <div class="heart"></div>
            <div id="timer"></div>
        </div>
        <div class="card">
            <input id="title" placeholder="بخصوص اي الكلام الحلو ده">
            <textarea id="content" placeholder="اكتبي اللي عجبك..."></textarea>
            <button onclick="window.saveMemory()">حفظ الكلام ي قمرى</button>
        </div>
        <div id="memoriesList"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA8f_AsUinvordYHDZuNUQ6rn1i_Ip4Ap0",
            authDomain: "ninoabou3li.firebaseapp.com",
            projectId: "ninoabou3li",
            storageBucket: "ninoabou3li.appspot.com",
            messagingSenderId: "348281108098",
            appId: "1:348281108098:web:2aa7e9f6faeadea3cd269b"
        };
        
        const db = getFirestore(initializeApp(firebaseConfig));

        window.checkPass = () => {
            if(document.getElementById('pass').value == "6122006") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                loadMemories();
            } else { alert("الباسورد غلط يا روحي!"); }
        };

        window.saveMemory = async () => {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            if(!title || !content) return alert("اكتبي حاجة الأول!");
            try {
                await addDoc(collection(db, "memories"), { title, content, date: new Date() });
                alert("تم الحفظ يا قمر!");
                location.reload();
            } catch(e) { alert("خطأ: " + e.message); }
        };

        async function loadMemories() {
            const list = document.getElementById('memoriesList');
            const snapshot = await getDocs(query(collection(db, "memories"), orderBy("date", "desc")));
            snapshot.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `<div class="card"><h3>${d.title}</h3><p>${d.content}</p></div>`;
            });
        }
    </script>
</body>
</html>
